<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Не(о)обновленец</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #e6ecf0;
}

.header {
    background-color: #0088cc;
    color: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    position: sticky;
    top: 0;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 15px;
}

.post {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.post h2 {
    margin-top: 0;
    font-size: 18px;
}

.post img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.post video {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.date {
    font-size: 12px;
    color: gray;
    margin-top: 10px;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: gray;
    padding: 20px;
}
</style>
</head>

<body>

<div class="header">
    Не(о)обновленец
</div>

<div class="container">

    <div class="post">
        <h2>Первый пост</h2>
        <p>
        Добро пожаловать на архив канала «Не(о)обновленец»
        </p>
        <div class="date">24 февраля 2026</div>
    </div>

    <div class="post">
        <h2>Пример с изображением</h2>
        <p>
        Здесь можно публиковать .
        </p>
        <img src="https://via.placeholder.com/600x400" alt="Пример изображения">
        <div class="date">24 февраля 2026</div>
    </div>

    <div class="post">
        <h2>Пример с видео</h2>
        <p>
        Здесь можно публиковать лекции или обращения.
        </p>
        <video controls>
            <source src="video.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
        <div class="date">24 февраля 2026</div>
    </div>

</div>

<div class="footer">
    © 2026 Не(о)обновленец 
</div>

</body>
</html>

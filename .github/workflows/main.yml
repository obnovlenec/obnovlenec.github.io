name: Telegram Auto Export

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # важно, чтобы был полный git history для pull/rebase

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot script
        run: python bot.py
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}

      - name: Commit and push changes
        run: |
          git config user.name "telegram-bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "Auto update from Telegram" || echo "No changes"
          git fetch origin main
          git rebase origin/main || echo "Rebase conflict, skipping"
          git push origin main
